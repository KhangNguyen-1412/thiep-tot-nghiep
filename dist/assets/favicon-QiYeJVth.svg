<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a365d" />
      <stop offset="100%" stop-color="#0a1829" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B3E" />
      <stop offset="30%" stop-color="#C5A059" />
      <stop offset="50%" stop-color="#FDF1D6" />
      <stop offset="70%" stop-color="#C5A059" />
      <stop offset="100%" stop-color="#9A7B3E" />
    </linearGradient>
    
    <!-- Shadow for Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Circle with Gold Border -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="12" filter="url(#dropShadow)" />

  <!-- Inner Gold Circle (Dotted/Thin) for Elegant Border -->
  <circle cx="256" cy="256" r="202" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8 8" opacity="0.5" />

  <!-- Graduation Cap Group -->
  <g filter="url(#dropShadow)">
    <!-- Cap Top (Diamond) -->
    <path d="M 256,135 L 405,210 L 256,285 L 107,210 Z" fill="url(#goldGrad)" />
    
    <!-- Cap Base (Neck) -->
    <path d="M 175,248 
             V 305 
             C 175,340 337,340 337,305 
             V 248 
             L 256,290 Z" 
          fill="url(#goldGrad)" />
          
    <!-- Cap Base Inner Detail (navy cut-out for depth) -->
    <path d="M 185,260
             V 300
             C 185,328 327,328 327,300
             V 260
             L 256,294 Z"
          fill="url(#bgGrad)" />

    <!-- Tassel String and Hanging Part -->
    <path d="M 256,210
             C 290,210 385,215 395,245
             L 395,315" 
          fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
          
    <!-- Tassel Brush -->
    <path d="M 387,315 
             H 403 
             L 399,355 
             H 391 Z" 
          fill="url(#goldGrad)" />
          
    <!-- Center Button -->
    <circle cx="256" cy="210" r="10" fill="url(#goldGrad)" />
  </g>

  <!-- Elegant Decorative Stars -->
  <!-- Top Star -->
  <path d="M 256,75 L 260,86 L 271,86 L 262,92 L 265,103 L 256,97 L 247,103 L 250,92 L 241,86 L 252,86 Z" fill="url(#goldGrad)" />
  <!-- Left Star -->
  <path d="M 115,295 L 117,300 L 122,300 L 118,303 L 119,308 L 115,305 L 111,308 L 112,303 L 108,300 L 113,300 Z" fill="url(#goldGrad)" opacity="0.7" />
  <!-- Right Star -->
  <path d="M 397,295 L 399,300 L 404,300 L 400,303 L 401,308 L 397,305 L 393,308 L 394,303 L 390,300 L 395,300 Z" fill="url(#goldGrad)" opacity="0.7" />
</svg>
